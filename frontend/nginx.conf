# =============================================================================
# PROPESQI Frontend nginx configuration
#
# Responsibilities:
#   1. Serve the Vite-built React SPA from /usr/share/nginx/html
#   2. Reverse-proxy /api/* to the backend service on the internal network
#      (port 8000 is never published to the host — nginx bridges the gap)
#   3. Properly handle SSE streaming and WebSocket upgrades
#
# Why nginx instead of `serve`:
#   The browser calls VITE_API_URL from the client side.  Since backend:8000
#   is only reachable on the Docker-internal network (not the host), the browser
#   cannot reach it directly.  nginx, running inside Docker, CAN reach it and
#   proxies the requests transparently at the same public origin (port 3000).
# =============================================================================

worker_processes auto;

# Write PID to /tmp so the process can run without root privileges
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Connection upgrade map — required to correctly handle both SSE and WebSocket
    #   WebSocket:  Connection: Upgrade
    #   SSE / HTTP: Connection: keep-alive  (empty $http_upgrade → keep-alive)
    # ---------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       keep-alive;
    }

    # Log to stdout/stderr so Docker captures them with `docker logs`
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile            on;
    keepalive_timeout   65;
    client_max_body_size 100m;   # Allow uploads up to 100 MB

    # ---------------------------------------------------------------------------
    # Upstream — backend FastAPI service (internal Docker network only)
    # ---------------------------------------------------------------------------
    upstream backend_upstream {
        server backend:8000;
        keepalive 16;   # Keep idle connections to backend for reuse
    }

    server {
        listen 3000;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # -----------------------------------------------------------------
        # /api/ — proxied to FastAPI backend
        # The trailing slash on proxy_pass strips the /api prefix before
        # forwarding, so GET /api/chat → GET /chat on the backend.
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend_upstream/;
            proxy_http_version 1.1;

            # Forward real client information to FastAPI middleware
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket / SSE upgrade headers (uses map above)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Disable response buffering so SSE chunks reach the browser
            # immediately without waiting for the full response body.
            proxy_buffering    off;
            proxy_cache        off;

            # Long read timeout — SSE streams can stay open for minutes
            proxy_read_timeout 3600s;

            # Raise connect/send timeouts to survive slow Ollama cold starts
            proxy_connect_timeout 30s;
            proxy_send_timeout    120s;
        }

        # -----------------------------------------------------------------
        # /ws — WebSocket endpoint (admin progress updates per §8.2)
        # Exposed separately to make the intent explicit in logs.
        # -----------------------------------------------------------------
        location /ws {
            proxy_pass         http://backend_upstream/ws;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # Static assets — long cache TTL for hashed filenames (Vite default)
        # -----------------------------------------------------------------
        location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # -----------------------------------------------------------------
        # SPA fallback — React Router handles all unknown paths client-side
        # index.html must never be cached so browsers always get the latest
        # asset hashes after a rebuild (JS bundles themselves use 1-year cache
        # because Vite gives them content-hashed names).
        # -----------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
